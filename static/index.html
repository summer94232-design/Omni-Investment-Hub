<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Omni-Investment Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f1117; color: #e2e8f0; }
.header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 600; color: #90cdf4; }
.nav { display: flex; gap: 4px; }
.nav button { background: transparent; border: 1px solid #2d3748; color: #a0aec0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.nav button.active, .nav button:hover { background: #2b6cb0; border-color: #2b6cb0; color: white; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; padding: 20px; max-width: 1600px; margin: 0 auto; }
.card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; }
.card-title { font-size: 13px; font-weight: 600; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; }
.BULL_TREND{background:#1c4532;color:#68d391;} .WEAK_BULL{background:#2d3a1a;color:#a0d454;}
.CHOPPY{background:#3d2a00;color:#f6ad55;} .BEAR_TREND{background:#3d1515;color:#fc8181;}
.metric { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2d3748; }
.metric:last-child { border-bottom: none; }
.label { font-size: 13px; color: #718096; }
.val { font-size: 15px; font-weight: 600; }
.good{color:#68d391;} .warn{color:#f6ad55;} .bad{color:#fc8181;} .neu{color:#90cdf4;}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 6px 8px; color: #718096; border-bottom: 1px solid #2d3748; font-weight: 500; }
td { padding: 8px; border-bottom: 1px solid #1e2535; }
tr:last-child td { border-bottom: none; }
.bar-wrap { background:#2d3748; border-radius:4px; height:6px; width:80px; display:inline-block; vertical-align:middle; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; background:#4299e1; }
.tag { display:inline-block; padding:2px 6px; border-radius:4px; font-size:11px; background:#2d3748; color:#a0aec0; margin:1px; }
.btn { background:#2b6cb0; color:white; border:none; padding:7px 14px; border-radius:7px; cursor:pointer; font-size:13px; white-space:nowrap; }
.btn:hover{background:#3182ce;} .btn.red{background:#c53030;} .btn.red:hover{background:#e53e3e;}
.btn.green{background:#276749;} .btn.green:hover{background:#38a169;}
.btn.amber{background:#744210;} .btn.amber:hover{background:#d69e2e;}
.btn.sm{padding:4px 10px;font-size:12px;}
.wide { grid-column: span 2; }
.page { display:none; } .page.active { display:block; }
input, select { background:#2d3748; border:1px solid #4a5568; color:#e2e8f0; padding:7px 10px; border-radius:6px; font-size:13px; width:100%; }
input:focus, select:focus { outline:none; border-color:#4299e1; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.form-label { font-size:12px; color:#718096; margin-bottom:4px; }
.result-box { background:#2d3748; border-radius:8px; padding:14px; margin-top:12px; font-size:13px; line-height:1.8; }
.mode-btn { padding:8px 16px; border-radius:8px; border:1px solid #4a5568; background:transparent; color:#a0aec0; cursor:pointer; font-size:13px; }
.mode-btn.active { background:#2b6cb0; border-color:#2b6cb0; color:white; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a1d2e; border:1px solid #2d3748; padding:12px 20px; border-radius:10px; font-size:13px; z-index:999; transform:translateY(80px); transition:transform .3s; }
.toast.show { transform:translateY(0); }
.slider-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.slider-row label { font-size:13px; color:#a0aec0; min-width:160px; }
.slider-row input[type=range] { flex:1; }
.slider-row span { font-size:13px; color:#90cdf4; min-width:40px; text-align:right; }
</style>
</head>
<body>
<div class="header">
  <h1>&#9889; Omni-Investment Hub</h1>
  <div class="nav">
    <button class="active" onclick="showPage('overview')">總覽</button>
    <button onclick="showPage('positions')">持倉管理</button>
    <button onclick="showPage('selection')">選股分析</button>
    <button onclick="showPage('tools')">工具</button>
    <button onclick="showPage('settings')">設定</button>
  </div>
  <span id="clock" style="font-size:12px;color:#718096"></span>
</div>

<!-- 總覽 -->
<div id="page-overview" class="page active">
  <div class="grid">
    <div class="card">
      <div class="card-title">宏觀環境</div>
      <div id="regime-content"><p style="color:#718096">載入中...</p></div>
    </div>
    <div class="card">
      <div class="card-title">組合健康</div>
      <div id="health-content"></div>
    </div>
    <div class="card wide">
      <div class="card-title">持倉快照 <button class="btn sm green" onclick="showPage('positions')">管理持倉 &#8594;</button></div>
      <div id="pos-preview"></div>
    </div>
    <div class="card">
      <div class="card-title">籌碼監控</div>
      <div id="chip-content"></div>
    </div>
    <div class="card">
      <div class="card-title">訊號日誌（最新5筆）</div>
      <div id="sig-preview"></div>
    </div>
  </div>
</div>

<!-- 持倉管理 -->
<div id="page-positions" class="page">
  <div class="grid">
    <div class="card wide">
      <div class="card-title">目前持倉 <button class="btn sm green" onclick="toggleAddForm()">+ 新增持倉</button></div>
      <div id="add-pos-form" style="display:none;background:#2d3748;padding:16px;border-radius:8px;margin-bottom:16px">
        <div class="form-row">
          <div><div class="form-label">股票代號</div><input id="ap-ticker" placeholder="例：2330"></div>
          <div><div class="form-label">進場價格</div><input id="ap-price" type="number" placeholder="850"></div>
        </div>
        <div class="form-row">
          <div><div class="form-label">股數</div><input id="ap-shares" type="number" placeholder="1000"></div>
          <div><div class="form-label">ATR（20日）</div><input id="ap-atr" type="number" placeholder="15"></div>
        </div>
        <div class="form-row">
          <div><div class="form-label">ATR 倍數</div><input id="ap-mult" type="number" value="3.0" step="0.5"></div>
          <div style="display:flex;align-items:flex-end;gap:8px">
            <button class="btn green" onclick="addPosition()">確認新增</button>
            <button class="btn" onclick="toggleAddForm()">取消</button>
          </div>
        </div>
      </div>
      <div id="positions-full"></div>
    </div>
  </div>
</div>

<!-- 選股分析 -->
<div id="page-selection" class="page">
  <div class="grid">
    <div class="card wide">
      <div class="card-title">
        選股排行
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:#718096">門檻分數</span>
          <input id="score-threshold" type="number" value="60" min="0" max="100" style="width:60px" onchange="renderSelection()">
        </div>
      </div>
      <div id="selection-content"></div>
    </div>
    <div class="card">
      <div class="card-title">EV 模擬</div>
      <div class="form-row">
        <div><div class="form-label">股票代號</div><input id="ev-ticker" placeholder="2330"></div>
        <div><div class="form-label">選股分數</div><input id="ev-score" type="number" value="65" min="0" max="100"></div>
      </div>
      <button class="btn" onclick="runEV()" style="width:100%">執行 EV 模擬</button>
      <div id="ev-result"></div>
    </div>
    <div class="card">
      <div class="card-title">觀察清單</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="wl-input" placeholder="輸入股票代號" style="flex:1">
        <button class="btn sm green" onclick="addToWatchlist()">新增</button>
      </div>
      <div id="watchlist-content"></div>
    </div>
  </div>
</div>

<!-- 工具 -->
<div id="page-tools" class="page">
  <div class="grid">
    <div class="card">
      <div class="card-title">每日排程</div>
      <p style="font-size:13px;color:#718096;margin-bottom:16px">手動觸發宏觀濾網，更新市場環境分析</p>
      <button class="btn" style="width:100%" onclick="runScheduler()">&#9654; 執行宏觀濾網</button>
      <div id="scheduler-result"></div>
    </div>
    <div class="card">
      <div class="card-title">黑天鵝模擬</div>
      <p style="font-size:13px;color:#718096;margin-bottom:16px">依目前 VIX 等指標檢查黑天鵝觸發條件</p>
      <button class="btn amber" style="width:100%" onclick="runBlackSwan()">&#9888; 執行黑天鵝檢查</button>
      <div id="bs-result"></div>
    </div>
    <div class="card">
      <div class="card-title">Walk-Forward 驗證</div>
      <p style="font-size:13px;color:#718096;margin-bottom:16px">分析歷史績效，更新因子權重建議</p>
      <button class="btn" style="width:100%;background:#553c9a" onclick="runWF()">&#128202; 執行 WF 驗證</button>
      <div id="wf-result"></div>
    </div>
    <div class="card">
      <div class="card-title">新增財經事件</div>
      <div class="form-row">
        <div><div class="form-label">日期</div><input id="event-date" type="date"></div>
        <div><div class="form-label">類型</div>
          <select id="event-type">
            <option value="FED">FED</option><option value="CPI">CPI</option>
            <option value="GDP">GDP</option><option value="PMI">PMI</option>
            <option value="EARNINGS">財報</option><option value="GEOPOLITICAL">地緣政治</option>
            <option value="OTHER">其他</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:10px">
        <div class="form-label">事件名稱</div>
        <input id="event-name" placeholder="例：Fed 利率決議">
      </div>
      <div class="form-row">
        <div><div class="form-label">影響等級（1-5）</div><input id="event-impact" type="number" value="3" min="1" max="5"></div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn green" style="width:100%" onclick="addEvent()">新增事件</button>
        </div>
      </div>
    </div>
    <div class="card wide">
      <div class="card-title">歷史訊號記錄</div>
      <div id="signals-full"></div>
    </div>
  </div>
</div>

<!-- 設定 -->
<div id="page-settings" class="page">
  <div class="grid">
    <div class="card">
      <div class="card-title">執行模式</div>
      <p style="font-size:13px;color:#718096;margin-bottom:16px">控制系統是否實際下單</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="mode-btn active" id="mode-PAPER" onclick="setMode('PAPER')">Paper</button>
        <button class="mode-btn" id="mode-ALERT_ONLY" onclick="setMode('ALERT_ONLY')">Alert Only</button>
        <button class="mode-btn" id="mode-SEMI_AUTO" onclick="setMode('SEMI_AUTO')">Semi Auto</button>
        <button class="mode-btn" id="mode-FULL_AUTO" onclick="setMode('FULL_AUTO')">Full Auto</button>
      </div>
      <div id="mode-desc" style="margin-top:12px;font-size:12px;color:#718096"></div>
    </div>
    <div class="card">
      <div class="card-title">模組參數調整</div>
      <div class="slider-row">
        <label>ATR 倍數（進場止損）</label>
        <input type="range" min="1.5" max="5" step="0.5" value="3.0" id="atr-mult" oninput="document.getElementById('atr-mult-val').textContent=this.value">
        <span id="atr-mult-val">3.0</span>
      </div>
      <div class="slider-row">
        <label>Trailing Stop %</label>
        <input type="range" min="5" max="30" step="1" value="15" id="trail-pct" oninput="document.getElementById('trail-pct-val').textContent=this.value+'%'">
        <span id="trail-pct-val">15%</span>
      </div>
      <div class="slider-row">
        <label>選股門檻分數</label>
        <input type="range" min="40" max="80" step="5" value="60" id="score-thresh" oninput="document.getElementById('score-thresh-val').textContent=this.value">
        <span id="score-thresh-val">60</span>
      </div>
      <div class="slider-row">
        <label>EV 最低門檻</label>
        <input type="range" min="0" max="2" step="0.1" value="0.5" id="ev-thresh" oninput="document.getElementById('ev-thresh-val').textContent=this.value+'R'">
        <span id="ev-thresh-val">0.5R</span>
      </div>
      <button class="btn" style="width:100%;margin-top:12px" onclick="saveSettings()">儲存設定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var DATA = {};
var SETTINGS = { mode: 'PAPER', atr_mult: 3.0, trail_pct: 15, score_threshold: 60, ev_threshold: 0.5 };
var MODE_DESC = {
  'PAPER': '模擬交易，不實際下單，適合測試與觀察',
  'ALERT_ONLY': '只發 Telegram 通知，不下單，適合人工決策',
  'SEMI_AUTO': '大單需人工確認，小單自動執行',
  'FULL_AUTO': '全自動下單，請確認風控設定正確'
};

setInterval(function() { document.getElementById('clock').textContent = new Date().toLocaleString('zh-TW'); }, 1000);

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  var pages = ['overview','positions','selection','tools','settings'];
  document.querySelectorAll('.nav button')[pages.indexOf(name)].classList.add('active');
  if (name === 'selection') renderSelection();
  if (name === 'tools') renderSignalsFull();
  if (name === 'positions') renderPositionsFull();
  if (name === 'settings') loadSettings();
}

function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isErr ? '#fc8181' : '#68d391';
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function post(url, body) {
  return fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(function(r) { return r.json(); });
}

function loadData() {
  fetch('/api/data').then(function(r) { return r.json(); }).then(function(d) {
    DATA = d;
    renderOverview();
  });
}

function renderOverview() {
  var reg = DATA.regime || {};
  var h = DATA.health || {};
  var vixCls = (reg.vix_level || 0) > 25 ? 'warn' : 'good';
  var expPct = h.gross_exposure_pct ? (h.gross_exposure_pct * 100).toFixed(1) : '0.0';
  var expCls = h.gross_exposure_pct > 0.8 ? 'bad' : h.gross_exposure_pct > 0.5 ? 'warn' : 'good';

  document.getElementById('regime-content').innerHTML =
    '<div style="margin-bottom:12px"><span class="badge ' + (reg.regime || '') + '">' + (reg.regime || 'N/A') + '</span></div>' +
    '<div class="metric"><span class="label">MRS 分數</span><span class="val neu">' + (reg.mrs_score || '-') + '</span></div>' +
    '<div class="metric"><span class="label">VIX</span><span class="val ' + vixCls + '">' + (reg.vix_level || '-') + '</span></div>' +
    '<div class="metric"><span class="label">曝險上限</span><span class="val neu">' + (reg.max_exposure_limit ? (reg.max_exposure_limit * 100).toFixed(0) + '%' : 'N/A') + '</span></div>';

  document.getElementById('health-content').innerHTML =
    '<div class="metric"><span class="label">NAV</span><span class="val neu">' + Number(h.nav || 0).toLocaleString() + ' 元</span></div>' +
    '<div class="metric"><span class="label">曝險比例</span><span class="val ' + expCls + '">' + expPct + '%</span></div>' +
    '<div class="metric"><span class="label">VaR 95%</span><span class="val warn">' + (h.portfolio_var_95 ? (h.portfolio_var_95 * 100).toFixed(2) + '%' : 'N/A') + '</span></div>' +
    '<div class="metric"><span class="label">熔斷狀態</span><span class="val ' + (h.circuit_breaker_triggered ? 'bad' : 'good') + '">' + (h.circuit_breaker_triggered ? '⚠ 觸發' : '正常') + '</span></div>';

  var posRows = (DATA.positions || []).slice(0, 5).map(function(p) {
    var r = p.r_multiple_current || 0;
    return '<tr><td>' + String(p.ticker || '').trim() + '</td><td><span class="tag">' + (p.state || '') + '</span></td><td class="' + (r >= 0 ? 'good' : 'bad') + '">' + Number(r).toFixed(2) + 'R</td><td class="' + (r >= 0 ? 'good' : 'bad') + '">' + Number(p.unrealized_pnl || 0).toLocaleString() + '</td></tr>';
  }).join('') || '<tr><td colspan="4" style="color:#718096;text-align:center">無持倉</td></tr>';
  document.getElementById('pos-preview').innerHTML = '<table><tr><th>股票</th><th>狀態</th><th>R</th><th>未實現損益</th></tr>' + posRows + '</table>';

  var chipRows = (DATA.chips || []).map(function(c) {
    var sc = c.crs_total || 0;
    return '<tr><td>' + String(c.ticker || '').trim() + '</td><td class="' + (sc >= 60 ? 'good' : sc >= 40 ? 'neu' : 'bad') + '">' + Number(sc).toFixed(1) + '</td><td>' + (c.three_way_resonance ? '<span class="good">✓</span>' : '-') + '</td></tr>';
  }).join('') || '<tr><td colspan="3" style="color:#718096;text-align:center">無資料</td></tr>';
  document.getElementById('chip-content').innerHTML = '<table><tr><th>股票</th><th>CRS</th><th>三向</th></tr>' + chipRows + '</table>';

  var sigRows = (DATA.signals || []).slice(0, 5).map(function(s) {
    var t = s.logged_at ? new Date(s.logged_at).toLocaleTimeString('zh-TW') : '-';
    return '<tr><td style="font-size:11px;color:#718096">' + t + '</td><td>' + (s.decision_type || '') + '</td><td>' + String(s.ticker || '').trim() + '</td></tr>';
  }).join('') || '<tr><td colspan="3" style="color:#718096;text-align:center">無訊號</td></tr>';
  document.getElementById('sig-preview').innerHTML = '<table><tr><th>時間</th><th>類型</th><th>股票</th></tr>' + sigRows + '</table>';
}

function toggleAddForm() {
  var f = document.getElementById('add-pos-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function renderPositionsFull() {
  var rows = (DATA.positions || []).map(function(p) {
    var r = p.r_multiple_current || 0;
    return '<tr><td>' + String(p.ticker || '').trim() + '</td><td><span class="tag">' + (p.state || '') + '</span></td><td>' + (p.entry_price || '-') + '</td><td>' + (p.current_stop_price || '-') + '</td><td class="' + (r >= 0 ? 'good' : 'bad') + '">' + Number(r).toFixed(2) + 'R</td><td class="' + (r >= 0 ? 'good' : 'bad') + '">' + Number(p.unrealized_pnl || 0).toLocaleString() + '</td><td><button class="btn sm red" onclick="closePosition(\'' + p.id + '\',' + (p.entry_price || 0) + ')">平倉</button></td></tr>';
  }).join('') || '<tr><td colspan="7" style="color:#718096;text-align:center">無持倉</td></tr>';
  document.getElementById('positions-full').innerHTML = '<table><tr><th>股票</th><th>狀態</th><th>進場價</th><th>止損價</th><th>R</th><th>未實現損益</th><th>操作</th></tr>' + rows + '</table>';
}

function closePosition(id, price) {
  if (!confirm('確定平倉？')) return;
  post('/api/close-position', { position_id: id, price: price }).then(function(r) {
    if (r.ok) { toast('平倉成功'); loadData(); }
    else toast('失敗：' + r.error, true);
  });
}

function addPosition() {
  var ticker = document.getElementById('ap-ticker').value;
  var price = document.getElementById('ap-price').value;
  var shares = document.getElementById('ap-shares').value;
  var atr = document.getElementById('ap-atr').value;
  var mult = document.getElementById('ap-mult').value;
  if (!ticker || !price || !shares) { toast('請填入股票、價格、股數', true); return; }
  post('/api/add-position', { ticker: ticker, entry_price: price, shares: shares, atr: atr || 15, atr_multiplier: mult || 3 }).then(function(r) {
    if (r.ok) { toast('持倉新增成功'); loadData(); toggleAddForm(); }
    else toast('失敗：' + r.error, true);
  });
}

function renderSelection() {
  var thresh = parseInt(document.getElementById('score-threshold').value) || 60;
  var rows = (DATA.stocks || []).map(function(s) {
    var sc = s.total_score || 0;
    var pass = sc >= thresh;
    var pct = Math.min(100, sc);
    return '<tr style="opacity:' + (pass ? 1 : 0.4) + '"><td>' + String(s.ticker || '').trim() + (pass ? ' <span class="tag" style="background:#1c4532;color:#68d391">✓</span>' : '') + '</td><td><span class="bar-wrap"><span class="bar-fill" style="width:' + pct + '%"></span></span> ' + Number(sc).toFixed(1) + '</td><td>' + Number(s.score_momentum || 0).toFixed(0) + '</td><td>' + Number(s.score_chip || 0).toFixed(0) + '</td><td>' + Number(s.score_fundamental || 0).toFixed(0) + '</td></tr>';
  }).join('') || '<tr><td colspan="5" style="color:#718096;text-align:center">無資料</td></tr>';
  document.getElementById('selection-content').innerHTML = '<table><tr><th>股票</th><th>總分</th><th>動能</th><th>籌碼</th><th>基本面</th></tr>' + rows + '</table>';
  loadWatchlist();
}

function loadWatchlist() {
  fetch('/api/watchlist').then(function(r) { return r.json(); }).then(function(list) {
    document.getElementById('watchlist-content').innerHTML = list.map(function(t) {
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #2d3748"><span>' + t + '</span><button class="btn sm red" onclick="removeFromWatchlist(\'' + t + '\')">移除</button></div>';
    }).join('') || '<p style="color:#718096;font-size:13px">清單為空</p>';
  });
}

function addToWatchlist() {
  var t = document.getElementById('wl-input').value.trim().toUpperCase();
  if (!t) return;
  post('/api/watchlist/add', { ticker: t }).then(function() { loadWatchlist(); document.getElementById('wl-input').value = ''; toast(t + ' 已加入觀察清單'); });
}

function removeFromWatchlist(t) {
  post('/api/watchlist/remove', { ticker: t }).then(function() { loadWatchlist(); toast(t + ' 已移除'); });
}

function runScheduler() {
  document.getElementById('scheduler-result').innerHTML = '<p style="color:#718096;margin-top:12px">執行中...</p>';
  fetch('/api/run-scheduler', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(r) {
    if (r.ok) {
      document.getElementById('scheduler-result').innerHTML = '<div class="result-box"><span style="color:#718096">環境：</span><span style="font-weight:600">' + r.regime + '</span>&nbsp;&nbsp;<span style="color:#718096">MRS：</span><span style="font-weight:600">' + r.mrs + '</span></div>';
      toast('宏觀濾網執行完成'); loadData();
    } else {
      document.getElementById('scheduler-result').innerHTML = '<div class="result-box bad">失敗：' + r.error + '</div>';
    }
  });
}

function runEV() {
  var ticker = document.getElementById('ev-ticker').value || 'TEST';
  var score = document.getElementById('ev-score').value || 60;
  document.getElementById('ev-result').innerHTML = '<p style="color:#718096;margin-top:12px">模擬中...</p>';
  post('/api/ev-simulate', { ticker: ticker, score: score }).then(function(r) {
    var vc = r.ev_total > 0.5 ? 'good' : 'bad';
    document.getElementById('ev-result').innerHTML = '<div class="result-box"><span style="color:#718096">EV：</span><span class="' + vc + '" style="font-weight:600">' + Number(r.ev_total || 0).toFixed(2) + 'R</span>&nbsp;&nbsp;<span style="color:#718096">勝率：</span><span style="font-weight:600">' + (Number(r.win_rate || 0) * 100).toFixed(0) + '%</span><br><span style="color:#718096">結論：</span><span class="' + (r.entry_valid ? 'good' : 'bad') + '" style="font-weight:600">' + r.reason + '</span></div>';
  });
}

function runBlackSwan() {
  document.getElementById('bs-result').innerHTML = '<p style="color:#718096;margin-top:12px">檢查中...</p>';
  fetch('/api/black-swan', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(r) {
    var msg = r.triggered > 0 ? '<div class="result-box bad">觸發 ' + r.triggered + ' 個情境</div>' : '<div class="result-box" style="color:#68d391">無黑天鵝情境觸發</div>';
    document.getElementById('bs-result').innerHTML = msg;
  });
}

function runWF() {
  document.getElementById('wf-result').innerHTML = '<p style="color:#718096;margin-top:12px">驗證中...</p>';
  fetch('/api/walk-forward', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(r) {
    if (r.recommended_weights) {
      var w = r.recommended_weights;
      document.getElementById('wf-result').innerHTML = '<div class="result-box"><span style="color:#718096">建議：</span><span style="font-weight:600">' + r.recommendation + '</span><br><span style="color:#718096">動能：</span><span style="font-weight:600">' + (w.momentum * 100).toFixed(0) + '%</span> <span style="color:#718096">籌碼：</span><span style="font-weight:600">' + (w.chip * 100).toFixed(0) + '%</span> <span style="color:#718096">基本面：</span><span style="font-weight:600">' + (w.fundamental * 100).toFixed(0) + '%</span></div>';
    } else {
      document.getElementById('wf-result').innerHTML = '<div class="result-box warn">資料不足，維持預設權重</div>';
    }
  });
}

function addEvent() {
  var d = document.getElementById('event-date').value;
  var type = document.getElementById('event-type').value;
  var name = document.getElementById('event-name').value;
  var impact = document.getElementById('event-impact').value;
  if (!d || !name) { toast('請填入日期與事件名稱', true); return; }
  post('/api/add-event', { event_date: d, event_type: type, name: name, impact_level: impact }).then(function(r) {
    if (r.ok) { toast('事件新增成功'); document.getElementById('event-name').value = ''; }
  });
}

function renderSignalsFull() {
  var rows = (DATA.signals || []).map(function(s) {
    var t = s.logged_at ? new Date(s.logged_at).toLocaleString('zh-TW') : '-';
    return '<tr><td style="font-size:11px;color:#718096">' + t + '</td><td>' + (s.decision_type || '') + '</td><td>' + String(s.ticker || '').trim() + '</td><td>' + (s.signal_source || '') + '</td></tr>';
  }).join('') || '<tr><td colspan="4" style="color:#718096;text-align:center">無訊號</td></tr>';
  document.getElementById('signals-full').innerHTML = '<table><tr><th>時間</th><th>類型</th><th>股票</th><th>來源</th></tr>' + rows + '</table>';
}

function setMode(mode) {
  SETTINGS.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('mode-' + mode).classList.add('active');
  document.getElementById('mode-desc').textContent = MODE_DESC[mode] || '';
}

function loadSettings() {
  fetch('/api/settings').then(function(r) { return r.json(); }).then(function(s) {
    SETTINGS = s;
    setMode(s.mode || 'PAPER');
    if (s.atr_mult) { document.getElementById('atr-mult').value = s.atr_mult; document.getElementById('atr-mult-val').textContent = s.atr_mult; }
    if (s.trail_pct) { document.getElementById('trail-pct').value = s.trail_pct; document.getElementById('trail-pct-val').textContent = s.trail_pct + '%'; }
    if (s.score_threshold) { document.getElementById('score-thresh').value = s.score_threshold; document.getElementById('score-thresh-val').textContent = s.score_threshold; }
    if (s.ev_threshold) { document.getElementById('ev-thresh').value = s.ev_threshold; document.getElementById('ev-thresh-val').textContent = s.ev_threshold + 'R'; }
  });
}

function saveSettings() {
  SETTINGS.atr_mult = parseFloat(document.getElementById('atr-mult').value);
  SETTINGS.trail_pct = parseInt(document.getElementById('trail-pct').value);
  SETTINGS.score_threshold = parseInt(document.getElementById('score-thresh').value);
  SETTINGS.ev_threshold = parseFloat(document.getElementById('ev-thresh').value);
  post('/api/settings/save', SETTINGS).then(function() { toast('設定已儲存'); });
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
