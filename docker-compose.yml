services:
  postgres:
    image: postgres:15-alpine
    container_name: omni-investment-postgres-1
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni2024secure
      POSTGRES_DB: omni_investment_hub
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - omni_investment_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: omni-investment-redis-1
    ports:
      - "6379:6379"
volumes:
  omni_investment_pgdata: